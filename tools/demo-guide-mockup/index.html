arrow the list and recompute Total Hours","**Import** and **Export**, plus a link to **Manage Labels**","Empty state when a period has no cards (\"No Time Cards logged for this Pay Period.\")"],"sp":["Contractor and worker hours for every client roll up per pay period in one place, so you","Labels plus import/export let you shape and move time data to fit each client's reporting."],"de":["You see total hours for the period and can drill into any worker to verify exactly what","Pay-period states (Scheduled / Pending approval / Complete) make it clear what still"],"branching":["**If** the buyer bills clients by time **then** open a worker's time card and show the","**If** the buyer manages many workers **then** stay on the roll-up and show Total Hours"],"say":"\"Pick a pay period and you get total hours for the whole team, then hours per worker. Click into anyone and you see every dated entry with its label and description. Filter by work type, import or export — it's the full timesheet workflow in one screen.\""},{"id":"071","title":"Manage Labels","module":"time-tracking","type":"page","tier":"low","nav_path":["Dashboard","Time Tracking","Manage Labels"],"children":["Create New Label","Save"],"tags":["time-tracking","labels","configuration"],"what":"The configuration screen for time-tracking labels, where the categories used to tag time entries are created and edited.","capabilities":["List of existing labels: Business Domain, Client Project, Delivery Phase, Priority,","**Create New Label** and **Save** to add or change labels","These are the labels applied to time entries and used as filters on the Time Tracking"],"sp":["You define the time-tracking taxonomy once, so hours across clients can be categorized"],"de":["You control how time is classified — by work type, project, phase, or priority — so"],"branching":["**If** the buyer asks how time is categorized **then** show this screen as the source of"],"say":"\"The labels you filter time cards by aren't fixed — you manage them here. Add a label, save, and it's immediately available to tag and slice hours.\""},{"id":"080","title":"Reimbursements","module":"reimbursements","type":"page","tier":"high","nav_path":["Dashboard","Reimbursements"],"children":["Pending request: Approve","Pending request: Decline","Pending request: row drilldown (e.g. Nina Thompson)","Request detail: View Receipt","History tab","History: Export","History: worker row drilldown"],"tags":["reimbursements","expenses","approvals","multi-currency","receipts","eor","contractor","payroll"],"what":"The expense-reimbursement screen, with a Pending Requests queue to approve or decline and a filterable History of all reimbursements, both spanning engagement types and currencies.","capabilities":["**Pending Requests** across engagement types (Contractor, Contractor+, EOR, Payroll)","Inline **Approve / Decline** per request","Row drilldown to a request detail showing worker, engagement, amount, client, expense","**History**: full ledger — name, date requested, date distributed (`Not Yet` when","Filters by worker, **Engagement**, **Status**, a **Sort** control, date range, and **Export**","Empty state (\"No Pending Expense Reimbursements Requests\")"],"sp":["One reimbursement queue spans every client engagement and currency, so you approve","Receipt preview plus an exportable 700+ row history gives each client an auditable"],"de":["Every expense awaiting a decision is in one queue, in the currency it was incurred, with","History with filters, sort, and export means every cross-border expense is traceable"],"branching":["**If** multi-currency operations are the hot button **then** stay on Pending Requests and","**If** the buyer cares about audit and controls **then** open a request, show View"],"say":"\"Every expense that needs you is right here — across EOR, payroll, and contractors, each in the currency it was spent, no conversion in your head. Open one to see the receipt, then approve or decline. History keeps the whole trail — hundreds of records, filterable, exportable, with who approved and when it was paid.\""},{"id":"090","title":"Reports (Hub)","module":"reports","type":"page","tier":"high","nav_path":["Reports"],"children":["Worker Report","Contractor Report","EOR Report","Payroll Report","Hour Log Report","Report Settings"],"tags":["reports","eor","contractor","payroll","hour-log","reporting"],"what":"The reporting hub at `/reports`, a card grid that routes to every report family — Worker, Contractor, EOR, Payroll, and Hour Log — plus a Report Settings control.","capabilities":["One entry point to five report families spanning the whole workforce","**Worker Report** — information across all workers regardless of engagement type","**Contractor Report** — view and download contractor data","**EOR Report** — employer-of-record reporting (gross, gross-to-net, GL, variance)","**Payroll Report** — organization-wide payroll reporting","**Hour Log Report** — hours logged by worker","Report Settings for configuring output"],"sp":["Every report family a client could ask for lives behind one hub — you answer","The same hub covers EOR, contractor, and payroll motions, so reporting scales"],"de":["Reporting across a multi-country, multi-engagement workforce starts from a single","The card layout maps directly to how you think about the business: workers,"],"branching":["**If** the audience runs an EOR-heavy workforce **then** open the **EOR Report**","**If** the audience is contractor-heavy **then** route to the **Contractor Report**"],"say":"\"This is your reporting hub. Everything you need to see about a global workforce — workers, contractors, EOR costs, payroll, hours logged — is one click from here. No stitching reports together across countries or systems.\""},{"id":"091","title":"Worker Report","module":"reports","type":"page","tier":"medium","nav_path":["Reports","Worker Report"],"children":["Show Map","Download Report","Pagination (Next/Previous, pages 1-3)"],"tags":["reports","worker","multi-country","multi-currency","engagement-mix"],"what":"The Worker Report at `/reports/worker-detail` — a filterable, downloadable table of every worker with summary tiles and a per-worker detail grid.","capabilities":["Summary tiles across the whole workforce: Total Workers (42), Pending Contracts (9),","One table listing every engagement type side by side (Contractor, EOR, Payroll)","**Multi-currency** base pay shown natively (USD, GBP, CAD, NIO)","**Multi-country** coverage (UK, US, Canada, Nicaragua, Taiwan) in one grid","Filters for date range, Engagement, Status, Countries, Pay Frequency","Show Map, Search, Download Report, and paginated results"],"sp":["A single roster shows every worker across every client engagement type and country —","Summary tiles quantify the mix (EOR vs. contractor vs. payroll) at a glance, so you"],"de":["Your entire cross-border headcount sits in one grid — native currencies, home","Filters and download turn \"how many workers, where, on what terms\" into a"],"branching":["**If** engagement mix is the story **then** anchor on the summary tiles and filter","**If** multi-currency operations matter **then** scroll the base-pay column to show"],"say":"\"Here's every worker you have, anywhere in the world, in one report. Forty-two people across the UK, US, Canada, Nicaragua, Taiwan — EOR, contractors, payroll — each paid in their local currency. Filter it, map it, download it. That's your whole workforce on one screen.\""},{"id":"092","title":"Contractor Report","module":"reports","type":"page","tier":"medium","nav_path":["Reports","Contractor Report"],"children":["Export"],"tags":["reports","contractor","export","multi-country"],"what":"The Contractor Report at `/reports/contractor` — a filterable, exportable report scoped to contractor engagements over a selected period.","capabilities":["Period selection via Start Date / End Date (defaulted to June 2026)","Filters for Engagement, Compensation, Countries, Pay Frequency","Search across contractors","Export the report"],"sp":["A dedicated contractor view lets you report on the contractor slice of a client's","Period-scoped export means clients get clean contractor records for any month."],"de":["Your contractor spend and roster is reportable and exportable on its own — filtered","One consistent report regardless of where contractors sit."],"branching":["**If** the workforce is contractor-heavy **then** lead here and filter by Countries","**If** finance needs records **then** demonstrate the Export for the selected period."],"say":"\"When you just need the contractor picture — who they are, where they are, what they're paid — this report isolates it, filters by country and pay frequency, and exports in one click.\""},{"id":"093","title":"EOR Report","module":"reports","type":"page","tier":"high","nav_path":["Reports","EOR Report"],"children":["Employer Gross Report","Employee Gross to Net Report","General Ledger Report","Variance Report"],"tags":["reports","eor","employer-gross","gross-to-net","general-ledger","variance"],"what":"The EOR Report sub-hub at `/reports/eor` — a card grid routing to the four employer-of-record reports: Employer Gross, Employee Gross to Net, General Ledger, and Variance.","capabilities":["**Employer Gross Report** — total payroll costs for EOR-managed workers, including","**Employee Gross to Net Report** — gross pay, deductions, and net pay per worker","**General Ledger Report** — accounting-ready output mapped to your general ledger","**Variance Report** — payroll changes across periods to flag inconsistencies or trends"],"sp":["The full EOR reporting suite — employer cost, net pay, GL mapping, variance — is","GL-ready and variance reports mean you support the client's accounting and controls,"],"de":["Everything finance asks about EOR employment — true employer cost, what employees net,","No exporting raw data and rebuilding it: the reports are shaped for accounting use."],"branching":["**If** the conversation is about total cost of employment **then** open **Employer","**If** the conversation is about finance/audit rigor **then** show **General Ledger**"],"say":"\"For your EOR population, this is the finance suite: employer gross cost, gross-to-net per employee, a general-ledger-ready export, and a variance report that flags what changed period to period. Everything your accounting team needs, built in.\""},{"id":"094","title":"EOR Employer Gross Report","module":"reports","type":"page","tier":"high","nav_path":["Reports","EOR Report","EOR Employer Gross Report"],"children":["Export"],"tags":["reports","eor","employer-gross","total-cost","taxes","contributions","export"],"what":"The EOR Employer Gross Report at `/reports/eor/employer-gross` — a filterable, exportable report of total payroll costs for EOR-managed workers, including gross wages, taxes, and contributions.","capabilities":["Period selection via Start Date / End Date (defaulted to June 2026)","Filters for Compensation, Countries, Pay Frequency","Search and Export","Aggregates the true employer cost: gross wages plus taxes and contributions"],"sp":["Clients see the fully loaded cost of their EOR workforce — not just wages, but the","Filtering by country makes it easy to show cost by market for a global book."],"de":["The real cost of employing across borders — wages, employer taxes, statutory","No manually assembling employer-side costs country by country."],"branching":["**If** the hot button is total cost of global employment **then** anchor the whole","**If** finance owns the room **then** demonstrate Export for the selected period."],"say":"\"This is what your EOR workforce actually costs you — gross wages plus every employer tax and contribution, per country, for the period you pick. One report, fully loaded, exportable to finance.\""},{"id":"095","title":"EOR Variance Report","module":"reports","type":"page","tier":"high","nav_path":["Reports","EOR Report","Variance Report"],"children":["Export"],"tags":["reports","eor","variance","period-comparison","controls","export"],"what":"The EOR Variance Report at `/reports/eor/variance` — a period-over-period comparison that tracks payroll changes for EOR employees to flag inconsistencies or trends.","capabilities":["Period comparison built in (\"Comparing June 2026 to May 2026\")","Filters for Compensation, Countries, Pay Frequency","Search and Export","Surfaces payroll changes across periods for review"],"sp":["Variance across periods is computed for you, so you can proactively flag changes in","Country filtering isolates where the movement happened across a global book."],"de":["What changed in EOR payroll from one period to the next is a report, not a","A built-in check on payroll accuracy across every country you employ in."],"branching":["**If** payroll accuracy or audit is the theme **then** lead with the June-vs-May","**If** the workforce spans many countries **then** filter by Countries to localize"],"say":"\"Every period, this compares your EOR payroll to the last one and flags what moved — June against May, here — so a change never slips by unnoticed. That's payroll controls built into the platform, across every country.\""},{"id":"096","title":"Payroll Report","module":"reports","type":"page","tier":"medium","nav_path":["Reports","Payroll Report"],"children":["Employer Gross Report","Employee Gross to Net Report","General Ledger Report","Variance Report"],"tags":["reports","payroll","employer-gross","gross-to-net","general-ledger","variance"],"what":"The Payroll Report sub-hub at `/reports/payroll` — a card grid routing to four organization-wide payroll reports: Employer Gross, Employee Gross to Net, General Ledger, and Variance.","capabilities":["**Employer Gross Report** — total payroll costs for the organization, including","**Employee Gross to Net Report** — individual earnings, deductions, and net pay","**General Ledger Report** — ledger-friendly breakdown mapped to your chart of accounts","**Variance Report** — compare payroll changes across periods to spot anomalies"],"sp":["The same finance-grade report set (gross, net, GL, variance) is available at the","Chart-of-accounts mapping means output drops straight into a client's accounting."],"de":["Organization-wide payroll reporting — total cost, per-employee net, GL mapping, and","Reports are shaped for finance, not raw data you have to reshape."],"branching":["**If** the audience thinks org-wide rather than EOR-only **then** demo here instead","**If** accounting integration matters **then** open **General Ledger** and its"],"say":"\"At the whole-organization level you get the same finance suite — employer gross, gross-to-net, a general-ledger export mapped to your chart of accounts, and variance across periods. Reporting that finance can use as-is.\""},{"id":"097","title":"Hour Log Report","module":"reports","type":"page","tier":"medium","nav_path":["Reports","Hour Log Report"],"children":["Pay Periods selector","Worker hour-log row"],"tags":["reports","hour-log","time-tracking","hourly","pay-periods"],"what":"The Hour Log Report at `/reports/hour-log` — a per-worker view of hours logged, selectable across 64 pay periods, listing each hourly worker with role, start date, and hourly rate.","capabilities":["Pay Periods selector spanning many months (64 periods available)","Per-worker hour-log entries: name, role, start date, hourly rate","Hourly workers across the organization (e.g. Ulrich Cooper $36.61/hr, Felix Hunt","Current View toggle for the selected period"],"sp":["Logged hours per worker per pay period are reportable directly, so you can back up","Deep period history (dozens of pay periods) means you can answer questions about any"],"de":["For hourly workers, the hours behind each pay run are visible per person and per","Selecting any of the historical pay periods reconstructs that cycle's hour logs."],"branching":["**If** the workforce is hourly-heavy **then** lead here and pick a prior pay period","**If** the theme is payroll accuracy **then** tie hour logs back to the payroll and"],"say":"\"For your hourly workers, every hour logged is here, per person, per pay period — and you can go back across dozens of periods. It's the source of truth behind what you paid and what you billed.\""},{"id":"100","title":"Tools & Resources (Hub)","module":"tools-resources","type":"page","tier":"medium","nav_path":["Dashboard","Tools & Resources"],"children":["Compensation Calculator","Holidays Calendar"],"tags":["tools","self-serve","compensation","holidays","pre-sales"],"what":"The Tools & Resources landing page, a hub with two self-serve utilities: a Compensation Calculator and a Holidays Calendar.","capabilities":["Entry point to a **Compensation Calculator** that estimates employer cost and employee take-home pay by country, amount, and pay frequency","Entry point to a **Holidays Calendar** covering public holidays across the countries where a team operates","Each tool is described in-line so users know what it does before opening it"],"sp":["A ready-made set of client-facing tools you can put in front of prospects and existing clients without building anything yourself.","Estimation and holiday-planning utilities live inside the same platform as payroll and onboarding, so the value story is one login, not a toolkit of disconnected calculators."],"de":["Practical, always-available utilities for planning global hires and schedules sit right next to the operational screens you use every day."],"branching":["**If** the conversation is pre-sales / cost-modeling **then** open the Compensation Calculator first.","**If** the audience runs distributed teams across time zones **then** lead with the Holidays Calendar."],"say":"\"Beyond the day-to-day workflows, we give you a couple of tools right in the platform — a compensation calculator to model the true cost of a hire in any country, and a holiday calendar so you always know who's off where. No spreadsheets, no separate logins.\""},{"id":"101","title":"Compensation Calculator","module":"tools-resources","type":"page","tier":"high","nav_path":["Dashboard","Tools & Resources","Compensation Calculator"],"children":[],"tags":["compensation","employer-cost","take-home","multi-country","multi-currency","pre-sales"],"what":"A calculator that estimates the total employer cost and the employee's net take-home pay for a hire in a chosen country, based on a gross salary, currency, and pay frequency.","capabilities":["Pick a **hire-in country** from 70+ options, an optional **state/region**, a gross salary, **local currency**, and Monthly/Annually frequency, then Calculate","**Employer pays** breakdown: Gross salary + Employer Contributions = Total Employer Cost (e.g. Canada 120,000 CAD + 9,670.2 = 129,670.2 CAD annually)","**Employee gets** breakdown: Gross salary − Deductions = Net salary (e.g. Canada 86,138.88 CAD net)","Toggle results between **Monthly** and **Annually**; Reset calculator to start over","Country-specific math — Argentina, Canada, and others each apply their own contribution and deduction rates"],"sp":["A concrete pre-sales asset: model the fully-loaded cost of a hire in any of 70+ countries in local currency, live, in the same platform you'd operate the hire from.","The split of employer contributions vs. employee deductions makes the true cost of global expansion tangible, which is exactly the number that moves a deal."],"de":["Before you commit to a hire, you see the total employer cost and the candidate's net pay side by side, in the local currency, with in-country contributions and deductions already applied.","No guesswork on statutory on-costs — the calculator encodes the country-specific rates so budgeting a cross-border role is a two-minute exercise."],"branching":["**If** the prospect is weighing which country to hire in **then** run the same salary through two countries (e.g. Canada vs. Argentina) to show the cost delta.","**If** the audience cares about candidate experience / offers **then** emphasize the \"Employee gets\" net-pay side.","**If** they operate multi-region within a country **then** show the state/region selector (e.g. Canada → British Columbia)."],"say":"\"Say you're thinking about a hire in Canada at 120,000 a year. One click and here's the whole picture — your total employer cost with contributions is about 129,670 CAD, and your employee takes home roughly 86,000 after deductions. Change the country and the math changes with it, in local currency. That's the real cost of going global, before you've signed a thing.\""},{"id":"102","title":"Holidays Calendar","module":"tools-resources","type":"page","tier":"medium","nav_path":["Dashboard","Tools & Resources","Holidays Calendar"],"children":[],"tags":["holidays","calendar","multi-country","scheduling","compliance"],"what":"A month-view calendar that overlays public holidays for a selected set of countries and in-country regions onto a single grid.","capabilities":["Add and remove **countries and regions** as chips (e.g. Canada, Canada - Nova Scotia, Canada - Ontario, United States, Singapore, United Kingdom, Mexico, Netherlands, Egypt, Philippines, Nicaragua, Taiwan)","Month-by-month navigation (Previous / Next month)","Holidays render **on their date with a country flag** — e.g. Canada Day (CA-NS and CA-ON) on Jul 1, US Independence Day, Egypt and Nicaragua Revolution Day — so overlapping holidays are visible at a glance","Region-level granularity within a country (Nova Scotia vs. Ontario shown separately)"],"sp":["One calendar shows the holiday picture across an entire multi-country book, so you can advise clients on coverage and pay-run timing without chasing local calendars."],"de":["You see, in one grid, which of your teams are off and when — including region-specific holidays — so scheduling and deadlines account for local time off automatically.","Country flags on each holiday make it obvious at a glance where a gap falls, rather than tracking a dozen national calendars yourself."],"branching":["**If** the team spans several countries **then** stack multiple country chips and point out overlapping/staggered holidays in the same month.","**If** the audience operates within one country across regions **then** show the region-level chips (e.g. Nova Scotia vs. Ontario)."],"say":"\"If your team is spread across countries, this is where you see everyone's public holidays on one calendar. Add the countries you care about — you can even go region by region — and every holiday shows up on its date with the flag, so you always know who's off before you plan a pay run or a deadline.\""},{"id":"110","title":"Settings — General","module":"settings","type":"page","tier":"low","nav_path":["Dashboard","Settings","General"],"children":["Users","Roles and Permissions","Approval Workflows","Assignments"],"tags":["settings","account","entity","billing","admin"],"what":"The General settings tab showing account overview details plus editable entity and billing-contact information for the client.","capabilities":["Read-only account **Overview**: Account Owner's Name, Email (with copy-to-clipboard), Client ID","**Entity Details** form: Name, Entity Type (LLC / S-corp / C-corp / Sole Proprietorship / LTD / unknown), Tax ID Number, full address, and a Country selector spanning 150+ countries and regions","**Billing Contact Info**: primary invoice email plus Add Another Email","Settings sub-navigation to Users, Roles and Permissions, Approval Workflows, Assignments"],"sp":["Client entity and billing configuration lives in the same platform as operations, so onboarding a new client's legal details is self-contained."],"de":["One place to keep your legal entity and invoice-routing details current, with country coverage broad enough for wherever your entity sits."],"branching":["**If** the account setup / legal-entity story is relevant **then** show the breadth of the Entity Type and Country selectors.","**Else** treat this as a completeness screen and move on to Users or Roles."],"say":"\"This is your account's home base — who owns it, your client ID, your legal entity and where invoices go. It's the plumbing; the interesting control lives in the next tabs, Users and Roles.\""},{"id":"111","title":"Settings — Users","module":"settings","type":"page","tier":"medium","nav_path":["Dashboard","Settings","Users"],"children":["User detail (e.g. Sarah Admin)","Invite User (modal)"],"tags":["settings","users","rbac","roles","manager-hierarchy","admin"],"what":"A table of the organization's admin users showing name, status, assigned role, and reporting manager, with inline controls to change role and manager and to invite new users.","capabilities":["User list with **Status** (Active / Invited), **Role**, and **Manager** per row (Account Owner shown as a fixed role)","Change a user's **Role** inline from a selector — Super Admin, Manager, HR, Admin, Onboard Only, Finance","Reassign a user's **Manager** inline from the roster of other users","**Invite User**, plus Search, Sort, and Filter over the list"],"sp":["Delegated administration at a glance: you can staff each client's account with the right mix of roles and reporting lines, and grant scoped access (e.g. Onboard Only) rather than all-or-nothing logins.","Inviting and role-assigning users inline means standing up a new client team is fast and auditable."],"de":["You control exactly who touches payroll, onboarding, and finance, and who they report to, from one table — role and manager are both editable inline.","Statuses make it obvious who has accepted their invite versus who is still pending."],"branching":["**If** the audience cares about least-privilege access **then** open a role selector and walk the six roles, then jump to a user detail to show the permission matrix.","**If** approval routing matters **then** highlight the Manager column as the backbone of the approval workflows."],"say":"\"Here's everyone with access to the account. Each person has a role — Super Admin, HR, Finance, Manager, Onboard Only — and a manager, and you can change both right here in the row. Invite someone in seconds and give them exactly the access they need, nothing more.\""},{"id":"112","title":"Settings — User Detail","module":"settings","type":"drilldown","tier":"low","nav_path":["Dashboard","Settings","Users","User detail"],"children":[],"tags":["settings","users","permissions","rbac","admin"],"what":"The detail view for a single user (e.g. Sarah Admin, Invited, Admin), showing their role and the full per-permission checkbox matrix that role grants.","capabilities":["User header with initials, name, status, email, current role, and a **Set as Inactive** action","Role selector (Super Admin / Manager / HR / Admin / Onboard Only / Finance) with a plain-language description of what the role can do","Granular permission matrix grouped into **People Management, Finance, Payments, Administration, Communication**, each with Select All and individual toggles (e.g. Onboard new hires, Approve/decline time-off requests, Pay invoices, View compensation calculator, Invite users, View/edit company settings)","Checkboxes reflect the selected role — e.g. Admin has most permissions but the Administration group's user/account controls are off"],"sp":["You can prove exactly what a given user can and can't do, permission by permission — useful when a client asks who can approve payments or edit company settings."],"de":["Fine-grained control: start from a role, then confirm or tune the exact capabilities, so access maps precisely to responsibility."],"branching":["**If** governance / SoD (separation of duties) is the concern **then** contrast a role that has Pay invoices with one that only has View invoices.","**Else** keep this brief — it's the evidence behind the Users and Roles screens."],"say":"\"Drill into any user and you see exactly what their role grants — every permission, grouped by area. Sarah's an Admin: she can run people and payments, but she can't touch company settings or delete the account. It's role-based, and it's transparent.\""},{"id":"113","title":"Settings — Roles and Permissions","module":"settings","type":"page","tier":"medium","nav_path":["Dashboard","Settings","Roles and Permissions"],"children":["Role detail (e.g. Owner)"],"tags":["settings","roles","permissions","rbac","admin"],"what":"A table of the available admin roles, each with a plain-language description and a way to view its permissions.","capabilities":["Seven roles listed with descriptions: **Owner** (all permissions + can delete account), **Super Admin** (all permissions), **Admin** (most, but no company settings), **HR** (all People Management, Payments, some Finance), **Manager** (onboard and view onboarding status), **Finance** (all Finance, most Payments), **Onboard Only** (People Management/Payments/some Finance, scoped to assigned team members)","**View Permissions** action per role to open the detailed matrix"],"sp":["A ready-made role library means you can standardize access across every client without designing permission sets from scratch."],"de":["Predefined roles map to how organizations actually split responsibility — HR, Finance, Managers, onboarders — so you assign access by job, not by guesswork."],"branching":["**If** access-control depth matters **then** open a role (e.g. Owner) to show the full permission matrix behind the description.","**If** delegated / scoped access is the point **then** contrast Onboard Only (\"only for assigned team members\") with Super Admin."],"say":"\"Access is role-based out of the box. Owner and Super Admin see everything; Admin stops short of company settings; HR, Finance, and Manager each get what their job needs; and Onboard Only is scoped to just their assigned people. Click into any role to see exactly what it can do.\""},{"id":"114","title":"Settings — Role Detail","module":"settings","type":"drilldown","tier":"low","nav_path":["Dashboard","Settings","Roles and Permissions","Role detail"],"children":[],"tags":["settings","roles","permissions","rbac","admin"],"what":"The read-only detail view for a single role (e.g. Owner), listing every permission the role has access to, grouped by area.","capabilities":["Role name and description header (e.g. \"Owner — Has all Administration, People Management, Payments, and Finance permissions, and can delete account\")","**Has Access** view of the permission matrix grouped by **Administration, Communication, Finance, Payments, People Management** — showing the specific capabilities included (e.g. Invite users, Can delete account, Pay invoices, View compensation calculator, Onboard new hires, Approve/decline time-off requests)"],"sp":["Concrete, auditable evidence of exactly what a role grants — the answer to \"what can this person do?\" without reverse-engineering it."],"de":["Confirms, permission by permission, that a role matches the responsibility you intend to delegate."],"branching":["**If** the audience challenges what a role covers **then** open this view and read down the group that concerns them.","**Else** treat as supporting detail for the Roles screen."],"say":"\"This is the full picture behind a role. Owner, for example, has every permission across Administration, Finance, Payments, and People Management — including the ability to delete the account. Nothing is hidden; you can see each capability spelled out.\""},{"id":"115","title":"Settings — Approval Workflows","module":"settings","type":"page","tier":"medium","nav_path":["Dashboard","Settings","Approval Workflows"],"children":["Edit Workflow (Time off Requests)","Edit Workflow (Pay Period Approvals)","Edit Workflow (Reimbursements)"],"tags":["settings","approvals","workflows","notifications","admin"],"what":"A configuration page defining the approval flow and notification recipients for three request types: time off, pay periods, and reimbursements.","capabilities":["Three configurable workflows — **Time off Requests** (vacation, sick leave, personal time), **Pay Period Approvals**, and **Reimbursements** (additional expenses and one-time payments)","Each has an **Approval Flow** with **+ Add Approver** and a **Will Receive Notifications** list with an add-recipient control","**Edit Workflow** per request type"],"sp":["Codify each client's approval chain once — who signs off on time off, pay runs, and reimbursements — so operations run consistently and notifications reach the right people."],"de":["Approvals aren't ad hoc: you define the chain of approvers and the notification list per request type, so payroll, time off, and expenses all route the way your controls require."],"branching":["**If** financial controls / multi-level sign-off is the hot button **then** anchor on Pay Period Approvals and the Add Approver flow.","**If** the audience is people-ops led **then** lead with Time off Requests."],"say":"\"Approvals are configurable per request type. Time off, pay periods, and reimbursements each get their own approval chain and their own notification list — so the right people sign off, and the right people get told, every time.\""},{"id":"116","title":"Settings — Assignments (Categories)","module":"settings","type":"page","tier":"low","nav_path":["Dashboard","Settings","Assignments","Categories"],"children":["Locations","Category Assignments","Add New Category Type"],"tags":["settings","org-structure","categories","divisions","departments","admin"],"what":"The Categories tab of Assignments, where the organization defines its structural categories — divisions, departments, and sub-departments — and sees how many workers sit in each.","capabilities":["Category types: **DIVISION**, **DEPARTMENT**, **SUB_DEPARTMENT**, each with a worker count","Divisions expand to specific entries (e.g. Engineering Division — 1 Worker, Product Division — 0 Workers) with per-node add actions","**Add New Category Type** to extend the taxonomy; Add controls per category and node","Assignments sub-navigation to Categories, Locations, and Category Assignments"],"sp":["Model each client's org structure to their own preference, so reporting and worker grouping reflect how the business is actually organized."],"de":["Define your own divisions, departments, and sub-departments and see headcount per node, giving structure to workers for reporting and assignment."],"branching":["**If** the audience has a complex org **then** show the nested Division → entries structure and Add New Category Type.","**Else** treat as a completeness screen."],"say":"\"This is where you shape the org to match your business — divisions, departments, sub-departments, however you're structured. Each shows its headcount, and you can add your own category types. It's the backbone for grouping and reporting on your workforce.\""},{"id":"120","title":"Support Cases (List)","module":"support-cases","type":"page","tier":"medium","nav_path":["Dashboard","Support Cases"],"children":["Create Case"],"tags":["support","cases","tickets","help"],"what":"The Support Cases list, showing all support cases in a table (Case ID, Subject, Type, Status, Created) with search and filters — here in its empty state.","capabilities":["Case table columns: **Case ID, Subject, Type, Status, Created**","**Search** cases, plus **Status** and **Type** filters","**Create Case** action (also surfaced in the empty state as \"Create your first support case to get started\")"],"sp":["Support requests are tracked in the same platform your clients work in — no separate helpdesk portal — so you can see and manage cases where the work happens."],"de":["In-product support means you raise and track issues without leaving the platform, filtered by status and type so nothing gets lost."],"branching":["**If** the account is new **then** the empty state guides the user straight to Create Case.","**If** support responsiveness is a concern **then** point to the status/type filtering as evidence cases are tracked and triaged."],"say":"\"Support lives right inside the platform. Every case you raise shows up here with its type and status, searchable and filterable. No separate portal, no lost emails — you open a case and track it to resolution in one place.\""},{"id":"121","title":"Support Case — Create","module":"support-cases","type":"page","tier":"medium","nav_path":["Dashboard","Support Cases","Create Case"],"children":[],"tags":["support","cases","create","categories","help"],"what":"The form for creating a new support case: pick a category, enter a subject and a detailed description, then submit.","capabilities":["**Case Type** category selector: Onboarding, Tax Forms, Schedule a Meeting, Product Feedback, Other, Letters, Change Request, Benefits","**Subject** (\"Brief description of your issue\") and **Issue Description** (guided prompt for relevant detail)","**Create Case** to submit, or Cancel","Reassurance copy: \"Our team will review it and get back to you\""],"sp":["The category list (Onboarding, Tax Forms, Letters, Change Request, Schedule a Meeting, Benefits) mirrors the real work of running global employment, so requests land pre-triaged for the right team."],"de":["Raising a case is structured, not a blank email — the category and guided description mean your issue reaches the right people with the context to resolve it faster."],"branching":["**If** the audience worries about service coverage **then** run the Case Type dropdown to show the breadth — from Tax Forms to Letters to Schedule a Meeting.","**If** they want a human **then** highlight \"Schedule a Meeting\" as a case type."],"say":"\"Need help? Creating a case is structured. Pick the type — onboarding, tax forms, a letter request, even scheduling a meeting — give it a subject and the details, and it routes to the right team. Categorized from the start, so you get the right answer faster.\""}];
const MODULES = [["dashboard","Dashboard"],["new-hire","New Hire"],["onboarding","Onboarding"],["team","Team"],["invoices","Invoices"],["time-off","Time Off"],["time-tracking","Time Tracking"],["reimbursements","Reimbursements"],["reports","Reports"],["tools-resources","Tools & Resources"],["settings","Settings"],["support-cases","Support Cases"]];
let sel = DATA[0] ? DATA[0].id : null;
let aud = 'both';
let q = '';

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>'); }
function byId(id){ return DATA.find(function(d){ return d.id===id; }); }
function tierRank(t){ return t==='high'?0:t==='medium'?1:2; }

function matches(d){
  if(!q) return true;
  var s=(d.title+' '+d.module+' '+(d.tags||[]).join(' ')).toLowerCase();
  return s.indexOf(q.toLowerCase())>=0;
}

function renderNav(){
  var nav=document.getElementById('nav'); nav.innerHTML='';
  MODULES.forEach(function(m){
    var key=m[0], label=m[1];
    var items=DATA.filter(function(d){ return d.module===key && matches(d); })
                  .sort(function(a,b){ return tierRank(a.tier)-tierRank(b.tier) || a.id.localeCompare(b.id); });
    if(!items.length) return;
    var g=document.createElement('div'); g.className='grp';
    var h=document.createElement('h4'); h.textContent=label + ' · ' + items.length; g.appendChild(h);
    items.forEach(function(d){
      var el=document.createElement('div'); el.className='item'+(d.id===sel?' active':'');
      el.innerHTML='<span class="dot '+d.tier+'"></span>'+esc(d.title);
      el.onclick=function(){ sel=d.id; render(); };
      g.appendChild(el);
    });
    nav.appendChild(g);
  });
  if(!nav.children.length){ nav.innerHTML='<div class="hint">No screens match "'+esc(q)+'"</div>'; }
}

function audBlock(d){
  var out='';
  function block(cls,who,items){
    if(!items||!items.length) return '';
    var lis=items.map(function(i){ return '<li>'+md(i)+'</li>'; }).join('');
    return '<div class="aud-block '+cls+'"><div class="who">'+who+'</div><ul class="clean">'+lis+'</ul></div>';
  }
  if(aud==='both'||aud==='sp') out+=block('sp','For service providers (PEOs / ASOs / payroll)',d.sp);
  if(aud==='both'||aud==='de') out+=block('de','For direct employers (hiring across borders)',d.de);
  return out || '<div class="what">No value narrative yet.</div>';
}

function render(){
  renderNav();
  var d=byId(sel); if(!d){ document.getElementById('wrap').innerHTML=''; return; }
  document.getElementById('crumb').textContent=(d.nav_path||[]).join('  ›  ');

  var caps=(d.capabilities||[]).map(function(c){ return '<li>'+md(c)+'</li>'; }).join('');
  var branch=(d.branching||[]).map(function(b){
    return '<div class="branch"><span class="ico">▸</span><span>'+md(b)+'</span></div>';
  }).join('');
  var jump=(d.children||[]).map(function(c){
    var t=byId_byTitle(c);
    return t ? '<a onclick="sel=\''+t.id+'\';render()">'+esc(c)+'</a>' : '<a class="dead" title="not yet cataloged">'+esc(c)+'</a>';
  }).join('');

  document.getElementById('wrap').innerHTML =
    '<h1>'+esc(d.title)+'</h1>'+
    '<div class="chips">'+
      '<span class="chip mod">'+esc(d.module)+'</span>'+
      '<span class="chip tier-'+d.tier+'">'+d.tier+' value</span>'+
      '<span class="chip type">'+esc(d.type)+'</span>'+
    '</div>'+
    (d.say ? '<div class="say"><span class="accent"></span><div class="lab">▶ Say this</div><p>'+md(d.say)+'</p></div>' : '')+
    (caps ? '<div class="sec"><h3>Capabilities shown</h3><div class="card"><ul class="clean">'+caps+'</ul></div></div>' : '')+
    '<div class="sec"><h3>Value narrative</h3><div class="card">'+audBlock(d)+'</div></div>'+
    (branch ? '<div class="sec"><h3>Branching</h3><div class="card">'+branch+'</div></div>' : '')+
    (d.what ? '<div class="sec"><h3>What this screen is</h3><div class="what">'+md(d.what)+'</div></div>' : '')+
    (jump ? '<div class="sec"><h3>Where you can go from here</h3><div class="jump">'+jump+'</div></div>' : '');
}

function byId_byTitle(label){
  // resolve a children_frontier label to an entry by loose title match
  var l=label.toLowerCase();
  return DATA.find(function(d){ return l.indexOf(d.title.toLowerCase())>=0 || d.title.toLowerCase().indexOf(l)>=0; });
}

document.getElementById('q').addEventListener('input',function(e){ q=e.target.value; renderNav(); });
document.getElementById('aud').addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b) return;
  aud=b.getAttribute('data-a');
  Array.prototype.forEach.call(this.children,function(x){ x.classList.toggle('on', x===b); });
  render();
});
render();
</script>
</body>
