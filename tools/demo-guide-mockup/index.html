<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PrismHR Global — Demo Sidekick (mockup)</title>
<style>
  :root {
    --navy:#0A1C40; --navy2:#0e2450; --blue:#2563eb; --blue-d:#1d4ed8;
    --orange:#e6701e; --bg:#F5F7FB; --card:#ffffff; --line:#e6ebf3;
    --ink:#0A1C40; --muted:#5b6b86; --green:#22c55e; --amber:#f59e0b;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink); background:var(--bg); }
  .app { display:grid; grid-template-columns:320px 1fr; height:100vh; }

  /* Sidebar */
  .side { background:var(--navy); color:#dfe6f2; display:flex; flex-direction:column; min-height:0; }
  .brand { display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid rgba(255,255,255,.08); }
  .brand .logo { width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#fff,#c9d6ee);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:12px;letter-spacing:.5px; }
  .brand b { color:#fff; font-size:15px; } .brand span { color:#93a6c9; font-size:12px; display:block; }
  .search { padding:12px 14px; }
  .search input { width:100%; padding:9px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:#fff; font-size:14px; }
  .search input::placeholder { color:#8ea3c7; }
  .nav { overflow:auto; padding:4px 8px 24px; flex:1; }
  .grp { margin:6px 4px 2px; }
  .grp h4 { color:#8ea3c7; font-size:11px; text-transform:uppercase; letter-spacing:.7px; margin:12px 8px 4px; }
  .item { display:flex; align-items:center; gap:9px; padding:7px 10px; border-radius:8px; cursor:pointer; color:#cdd8ec; font-size:13.5px; }
  .item:hover { background:rgba(255,255,255,.06); }
  .item.active { background:var(--blue); color:#fff; }
  .dot { width:7px;height:7px;border-radius:50%; flex:none; }
  .dot.high{background:var(--orange);} .dot.medium{background:var(--blue);} .dot.low{background:#5b6b86;}
  .count { margin-left:auto; font-size:11px; color:#7f93b7; }

  /* Main */
  .main { overflow:auto; min-height:0; }
  .top { position:sticky; top:0; background:rgba(245,247,251,.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); padding:14px 28px; display:flex; align-items:center; gap:16px; z-index:5; }
  .crumb { color:var(--muted); font-size:12.5px; }
  .toggle { margin-left:auto; display:flex; background:#e7edf6; border-radius:9px; padding:3px; }
  .toggle button { border:0; background:transparent; padding:6px 12px; border-radius:7px; font-size:12.5px; font-weight:600; color:var(--muted); cursor:pointer; }
  .toggle button.on { background:#fff; color:var(--navy); box-shadow:0 1px 2px rgba(10,28,64,.12); }
  .wrap { max-width:860px; margin:0 auto; padding:26px 28px 80px; }
  h1 { font-size:26px; margin:0 0 6px; }
  .chips { display:flex; gap:8px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
  .chip { font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px; }
  .chip.mod { background:#e7edf6; color:var(--navy); }
  .chip.tier-high{ background:#fde8d7; color:#b6531a; } .chip.tier-medium{ background:#dbe6fd; color:var(--blue-d);} .chip.tier-low{ background:#eef1f6; color:#5b6b86;}
  .chip.type { background:#eaf7ee; color:#1a7f3c; }

  .say { background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; border-radius:14px; padding:20px 22px; margin-bottom:22px; position:relative; box-shadow:0 8px 24px rgba(10,28,64,.18); }
  .say .lab { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#9db4dc; margin-bottom:8px; display:flex; align-items:center; gap:7px;}
  .say p { margin:0; font-size:18px; line-height:1.55; }
  .say .accent { position:absolute; left:0; top:16px; bottom:16px; width:4px; background:var(--orange); border-radius:4px; }

  .sec { margin:0 0 22px; }
  .sec h3 { font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:0 0 10px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 18px; }
  ul.clean { margin:0; padding-left:20px; } ul.clean li { margin:6px 0; }
  .aud-block { margin-bottom:14px; }
  .aud-block .who { font-weight:700; font-size:13px; color:var(--blue-d); margin-bottom:6px; }
  .aud-block.de .who { color:var(--orange); }
  .branch { display:flex; gap:10px; padding:10px 0; border-top:1px dashed var(--line); }
  .branch:first-child { border-top:0; }
  .branch .ico { color:var(--orange); font-weight:800; flex:none; }
  .what { color:var(--muted); font-size:14px; }
  .jump { display:flex; flex-wrap:wrap; gap:8px; }
  .jump a { font-size:12.5px; padding:5px 10px; border-radius:8px; background:#eaf0f9; color:var(--navy); text-decoration:none; border:1px solid var(--line); cursor:pointer; }
  .jump a.dead { color:#93a2ba; cursor:default; }
  code { background:#eef2f8; padding:1px 5px; border-radius:5px; font-size:.9em; }
  .hint { color:var(--muted); font-size:12px; padding:2px 6px; }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="logo">GBL</div>
      <div><b>Demo Sidekick</b><span>PrismHR Global · mockup</span></div>
    </div>
    <div class="search"><input id="q" placeholder="Search screens, modules, tags…" /></div>
    <div class="nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="top">
      <div class="crumb" id="crumb"></div>
      <div class="toggle" id="aud">
        <button data-a="both" class="on">Both</button>
        <button data-a="sp">Service Provider</button>
        <button data-a="de">Direct Employer</button>
      </div>
    </div>
    <div class="wrap" id="wrap"></div>
  </main>
</div>
<script>
const DATA = [{"id":"001","title":"Dashboard (Home)","module":"dashboard","type":"page","tier":"high","nav_path":["Login","Dashboard"],"children":["New Hire","Onboarding","Team","Invoices","Time Off","Time Tracking","Reimbursements","Reports","Tools & Resources","Settings","Support Cases","Pay Periods: Add One-Time Payment (modal)","Pay Periods: pay run drilldown","Reimbursements: View Requests","Reimbursements: row drilldown (e.g. Nina Thompson)","Time Off: View Requests","Time Off: row drilldown (e.g. John Contractor)","Reminders: dismiss (x)","Header: notifications bell","Header: support headset","Header: account menu (DA)"],"tags":["landing","approvals","multi-currency","eor","contractor"],"what":"The post-login landing screen for an admin, scoped to a service provider's client (\"Antaeus Service Provider – Main Client\"). It surfaces everything awaiting action — pay periods, reimbursements, time-off requests — plus country-aware holiday reminders and quick links.","capabilities":["One approval queue spanning **EOR and contractor** pay runs in a single view","**Multi-currency** amounts (GBP, USD) shown natively, side by side","Country-aware **holiday reminders** (Canada Day, US Independence Day)","Client-scoped context (\"Service Provider – Main Client\")","Action-first home: pending counts and \"Ready to Approve\" states up front"],"sp":["One login shows the whole book of client activity that needs action — you operate","EOR and contractor pay runs share one queue: the breadth of the global motion you"],"de":["The moment you log in, every cross-border obligation that needs a decision is in","Local compliance surfaces as reminders (in-country holidays) instead of something"],"branching":["**If** the workforce is contractor-heavy **then** open the `CONTRACTOR | MONTHLY`","**If** multi-entity / multi-currency operations are the hot button **then** anchor"],"say":"\"This is the first thing you see when you log in. Notice we're not on a menu hunt — every pay run, reimbursement, and time-off request that needs you is right here, across EOR and contractors, in whatever currency it was incurred. One screen, your entire global book, ready to action.\""},{"id":"002","title":"Add One-Time Payment","module":"dashboard","type":"page","tier":"high","nav_path":["Dashboard","Add One-Time Payment"],"children":["Confirm One-Time Payment (step 2)","Payment Confirmed (success modal)","Add Another Payment","Close (returns to Dashboard)"],"tags":["pay-periods","one-time-payment","bonus","multi-currency","multi-country","eor","contractor","payroll"],"what":"A three-step flow for adding an ad-hoc payment (bonus, commission, equipment, etc.) to a chosen pay period, entering a type and amount per worker in each worker's local currency, then reviewing and confirming.","capabilities":["Pick the pay period by **type** (EOR, CONTRACTOR, PAYROLL) and by **cycle** (current or next), scoping the worker list accordingly","Per-worker rows spanning many countries (UK, US, Canada by province, Nicaragua, Taiwan, Egypt, Mexico) with each worker's local currency (GBP, USD, CAD, NIO, TWD) locked to the row","A fixed set of payment types per worker: Signing Bonus, Commission, Spiff, Performance, Holiday, Equipment, Other","Search, country filter, and name sort to find workers in a large roster","A confirm step (\"Confirm One-Time Payment\") that summarizes each payment converted to local currency, shows total pay and next pay date, and rolls up a currency total before processing","Success state confirming the payment will land in each worker's next paycheck, with \"Add Another Payment\" or \"Close\""],"sp":["One flow issues off-cycle pay across EOR, contractor, and payroll worker types and across countries, so you administer bonuses for a whole book without a separate tool per country.","Each amount is entered and confirmed in the worker's own currency, and the product handles the conversion into the next paycheck — the operational complexity of paying globally is absorbed."],"de":["Rewarding a team member in another country is a few clicks on the same screen you already run payroll from — no wire, no local intermediary.","The confirm step shows exactly what each worker receives in local currency and when, so an ad-hoc bonus carries no surprise about timing or FX."],"branching":["**If** the audience runs a contractor-heavy workforce **then** set Pay Period Type to `CONTRACTOR` and issue a bonus across several countries in one pass.","**If** multi-currency is the hot button **then** dwell on the per-row currency lock (GBP/USD/CAD/NIO/TWD) and the local-currency conversion called out on the confirm step."],"say":"\"Say you want to hand out a spot bonus. Pick the pay period, find the worker, choose the payment type, type the amount — in their currency, not yours. We show you exactly what they'll receive and in which paycheck, you confirm, and it's done. Same screen whether they're an employee in the UK or a contractor in Taiwan.\""},{"id":"003","title":"Pay Period Approval","module":"dashboard","type":"page","tier":"high","nav_path":["Dashboard","Pay Period Approval"],"children":["Detailed Currency View (overlay)","Reimbursement Details (row drilldown, e.g. Pablo Contractorplus)","Import Distribution data","Add one-time distribution","Approve $58,579.23 USD (submits approval)"],"tags":["pay-periods","approval","multi-currency","fx","hourly","fixed-rate","reimbursements","one-time-payment","contractor"],"what":"The full approval view for a monthly pay period, itemizing every payment component — additional allowances, one-time payments, hourly and fixed-rate wages, and reimbursements — behind a single \"Approve\" action for the whole run's total.","capabilities":["One approvable total (\"Approve $58,579.23 USD\") covering an entire pay period in a single action","Distinct itemized sections: Additional Payments (allowances), One time Payments (bonuses), Hourly Workers (rate x hours), Fixed Rate Workers (monthly rate, with proration noted, e.g. \"prorated from starting date Jun 15, 2026\"), and Reimbursements","Line items across many currencies (USD, CAD, GBP, EGP) shown natively, including a one-time Equipment payment ($200.00) flowing in from the Add One-Time Payment flow","**Detailed Currency View** overlay that rolls native amounts into a global total with an approximate USD conversion, flagged as an FX estimate that may fluctuate","Per-row **Reimbursement Details** drilldown (amount, status, requester, expense date, description)","\"Import Distribution data\" and \"Add one-time distribution\" to adjust the run before approving"],"sp":["The entire pay run — wages, bonuses, allowances, reimbursements, across currencies — resolves to one number and one approval, so you clear a client's period without reconciling separate systems.","The Detailed Currency View turns a mixed-currency run into an auditable global total, which is exactly the multi-country visibility you resell."],"de":["You approve a whole month of global pay in one click, while still being able to open any line item — an hourly worker's hours, a reimbursement's receipt detail — before you commit.","Native currencies plus an approximate USD roll-up mean you see both what each person is paid locally and what the run costs you overall."],"branching":["**If** cost control / FX exposure is the theme **then** open the Detailed Currency View and anchor on the global total with its FX-estimate disclaimer.","**If** the workforce mixes employment models **then** walk the Hourly, Fixed Rate, and One time Payment sections to show one queue absorbing every pay type.","**If** expense governance matters **then** drill into a Reimbursement Details row to show the approved receipt trail feeding the same run."],"say":"\"This is a full month of pay for the whole team — hourly hours, fixed salaries, allowances, bonuses, reimbursements, in every currency they were incurred. It all rolls into one number. Want to see it in one currency? Detailed view gives you the global total. Want to check a single receipt? Click the row. Then one Approve, and the period is cleared.\""},{"id":"004","title":"Pay Period Detail","module":"dashboard","type":"page","tier":"medium","nav_path":["Dashboard","Pay Period"],"children":["Approve (opens Pay Period Approval)","Invoice","Distribute","Upload"],"tags":["pay-periods","status","lifecycle","approval-deadline","distribution"],"what":"The status detail for a single pay period, showing its key dates and lifecycle stage (here, \"Pending Approval\") with the Approve, Invoice, and Distribute steps.","capabilities":["Key dates for the period: Pay Period Id, Target Distribution Date, Required Approval Date, and Anticipated Invoice Date","The pay period lifecycle exposed as ordered actions: **Approve → Invoice → Distribute**","A Pending Approval notice tying the required approval date to on-time collection and distribution by the payment partner (Listo)","An Upload action for supporting distribution data"],"sp":["Every period carries its own dated status card, so across a book of clients you can see at a glance which runs are still pending and when each must be approved to distribute on time.","The Approve/Invoice/Distribute sequence makes the operational chain explicit, so the workflow you operate on clients' behalf is legible rather than opaque."],"de":["One glance tells you where the period stands and the exact date you must act by to keep pay on schedule.","The deadline is framed around the outcome — on-time collection and distribution — so the consequence of the approval date is spelled out, not left to you to infer."],"branching":["**If** the conversation is about missed-deadline risk **then** anchor on the Required Approval Date and the Pending Approval notice.","**If** the audience wants to see the end-to-end run **then** use Approve here as the jump into the full Pay Period Approval view (003)."],"say":"\"Each pay period has a status page like this. It tells you the dates that matter — when it has to be approved, when it invoices, when it distributes — and where it is right now. This one's pending approval, and it's clear you need to approve by the 23rd to keep pay on time. From here you move it down the line: approve, invoice, distribute.\""},{"id":"020","title":"New Hire — Worker Type","module":"new-hire","type":"page","tier":"high","nav_path":["New Hire"],"children":["EOR wizard: Employee Info (Select Employee)","Contractor wizard: start (Select Contractor)"],"tags":["new-hire","eor","contractor","global-hiring","wizard-entry"],"what":"The entry point of the New Hire flow, asking whether to hire an **Employee** (EOR) or a **Contractor** before branching into the matching wizard.","capabilities":["Single starting point for two compliant global-hiring motions","**Employee** path: hire employees compliantly in over 180 countries","**Contractor** path: classify and hire contractors compliantly in over 180 countries","Worker-type choice made up front, before any data entry"],"sp":["One flow lets you originate both EOR employment and contractor engagements for your","Compliant classification and hiring across 180+ countries is the headline before a"],"de":["Whether the next hire is a full employee or a contractor, you start in the same place and","The 180+ country reach is stated at the door, so global expansion is a choice on this"],"branching":["**If** the audience hires primarily full-time staff abroad **then** take the **Employee**","**If** the audience relies on contractors **then** take the **Contractor** path and"],"say":"\"Every global hire starts here with one decision — employee or contractor. Pick either and we hire them compliantly in over 180 countries. That's the whole point: the hard part, local compliance, is built into whichever path you choose.\""},{"id":"021","title":"EOR — Employee Info","module":"new-hire","type":"page","tier":"high","nav_path":["New Hire","EOR","Employee Info"],"children":["EOR wizard: Job Info (Next)"],"tags":["new-hire","eor","global-hiring","country-selection","compliance","singapore"],"what":"Step 01 of the six-step EOR wizard: capture the employee's name, email, **nationality**, and **working country**, with country-specific compliance prompts appearing based on the selection.","capabilities":["Six-step progress stepper (Employee Info → Job Info → Compensation → Equipment → Benefits → Submit)","Nationality and working-country pickers covering **175+ countries**, including sub-national","Country-aware compliance: selecting **Singapore** surfaces a note about local rules on","Save & Exit to resume the draft later"],"sp":["The same intake form services any of 175+ countries, down to the sub-region level — you","Local nuance is delivered inline (the Singapore rules note) so your team doesn't need to be"],"de":["Nationality and work location are separated, so cross-border situations (a Mexican national","The moment you pick a country, the product tells you what's different about it — compliance"],"branching":["**If** hiring into a jurisdiction with distinctive rules (e.g. Singapore) **then** show the","**If** the audience operates sub-nationally (Canada, Australia, China) **then** open the"],"say":"\"First step, who are they and where do they work. That country list is 175-plus deep — right down to Canadian provinces and Australian states. And watch: pick Singapore and the product immediately flags the local rules on bonuses, severance, and benefits. You don't have to know every country's law — the platform does.\""},{"id":"022","title":"EOR — Job Info","module":"new-hire","type":"page","tier":"high","nav_path":["New Hire","EOR","Job Info"],"children":["EOR wizard: Compensation (Next)","Assign Manager (modal)"],"tags":["new-hire","eor","job","seniority","org-structure","manager","start-date"],"what":"Step 02 of the EOR wizard: define the role — job title, **seniority level**, description, optional org assignment (division/location), reporting manager, and target start date.","capabilities":["**Seniority** picker spanning the full ladder: Not Applicable, Junior, Mid, Senior, Lead,","Job description carried into the contract (\"This section will be included in the original","Optional **org assignment**: Division (Engineering / Product) with a dependent sub-division","**Assign Manager** modal listing existing org members with roles (HR, Finance, Admin, Super","**Target start date** picker that disables unavailable dates and warns that regulatory,"],"sp":["The role definition maps a global hire straight onto the client's existing org — divisions,","The date picker flags visa/work-permit delays inline, so you set client expectations on"],"de":["A full seniority ladder and org placement mean a cross-border hire slots into your structure","Assigning a manager here wires up approvals from day one — that person owns the new hire's"],"branching":["**If** org structure / reporting lines matter to the audience **then** open the Assign","**If** timelines are the concern **then** open the date picker and surface the visa /"],"say":"\"Now the role. Pick a seniority from Junior all the way to SVP, drop them into a division and office, and assign a manager — that manager will approve their time off and expenses from here on. Notice the start date even warns you when visa or permit timing could push things out. It's role-building and compliance in one step.\""},{"id":"023","title":"EOR — Compensation","module":"new-hire","type":"page","tier":"high","nav_path":["New Hire","EOR","Compensation"],"children":["EOR wizard: Equipment (Next)","Add Additional Payment (modal)","Amount confirmation / FX (modal)"],"tags":["new-hire","eor","compensation","local-currency","multi-currency","pto","statutory","benefits","fx"],"what":"Step 03 of the EOR wizard: set pay in the employee's **local currency** — salary or hourly, employment type, contract term, additional payments, and paid time-off — with a live cost breakdown and an FX confirmation.","capabilities":["**Local-currency comp**: amount is entered/paid in the employee's local currency (e.g. SGD),","Compensation type (Hourly / Salary), Employment type (Full-time / Part-time), Contract term","**Live salary breakdown** showing employer side (gross + total employer contribution =","**Additional payments** via modal — Pay type (Variable Bonus, Mobile/Internet/Other","**Statutory PTO** surfaced automatically (e.g. Singapore: all local public holidays + 20","**FX confirmation modal**: converts the local-currency pay to the payer's currency (e.g."],"sp":["Comp is built and validated in the worker's local currency, with employer-vs-employee cost","Statutory holidays and minimum PTO for the working country pre-populate, so your team isn't"],"de":["Enter pay the way the employee experiences it (their currency, their statutory leave) and see","Bonuses and allowances carry their own frequency and tax treatment, so total cost of the hire"],"branching":["**If** total cost of a global hire is the hot button **then** anchor on the salary breakdown","**If** local compliance is the concern **then** highlight the auto-populated statutory PTO and"],"say":"\"Pay is in their local currency — Singapore dollars here — because that's the law. Type the salary and the breakdown shows you the real cost: two thousand gross, employer contributions on top, total monthly cost. Their statutory holidays and twenty days of leave are already in. And before we continue, we show you what that costs in your currency — about fifteen hundred US dollars — at today's FX. Full loaded cost, no spreadsheet.\""},{"id":"024","title":"EOR — Equipment","module":"new-hire","type":"page","tier":"medium","nav_path":["New Hire","EOR","Equipment"],"children":["EOR wizard: Benefits (Next)"],"tags":["new-hire","eor","equipment","policy"],"what":"Step 04 of the EOR wizard: choose the **equipment policy** for the new hire from a single dropdown.","capabilities":["One dropdown captures how equipment is handled, with three options:","the client provides the equipment,","the new hire uses their personal equipment for work, or","the client provides a reimbursement for equipment purchase","Option labels are scoped to the client name (e.g. \"Antaeus Service Provider - Main Client\")"],"sp":["Equipment handling is a per-hire policy captured in one field, and the options are labeled","Reimbursement-for-equipment is a built-in choice, so device provisioning ties back into the"],"de":["Deciding who supplies the laptop is a single dropdown, not a side conversation — the answer","BYO-device and reimbursement models are first-class options, so remote and in-office setups"],"branching":["**If** the audience runs a BYO-device or reimbursement model **then** show that option and","**If** equipment isn't a talking point **then** treat this as a quick single-select step and"],"say":"\"Equipment is one dropdown. You provide it, they use their own, or you reimburse them — pick one and it's baked into the offer. No separate procurement thread.\""},{"id":"025","title":"EOR — Benefits","module":"new-hire","type":"page","tier":"high","nav_path":["New Hire","EOR","Benefits"],"children":["EOR wizard: Submit (Next)"],"tags":["new-hire","eor","benefits","supplemental","tiers","pricing","safetywing"],"what":"Step 05 of the EOR wizard: optionally add **private supplemental benefits** by choosing from three priced tiers.","capabilities":["Optional benefits toggle (Yes / No) — \"Do you want to offer private supplemental benefits?","Three priced tiers, each with coverage and a plan link (SafetyWing):","**Standard** — from $130/month — Inpatient Treatments, Outpatient Cover, Dental & Vision Cover","**Premium** (MOST POPULAR) — from $210/month — Inpatient Treatments, Outpatient Cover,","**Premium + Maternity** — from $260/month — the Premium coverage plus Maternity and Newborn Cover","Pricing disclaimer on each tier: \"*Priced for ages 18-39\"","Per-tier select actions (Select Standard / Premium / Premium+); selecting a tier marks it chosen"],"sp":["Supplemental benefits are a packaged, priced add-on you can attach to any global hire in one","Transparent monthly pricing per tier lets you position benefits to clients on the spot."],"de":["Competitive private coverage (medical, dental, vision, maternity) is available as three clear","Choosing a tier is optional and reversible in-flow, so benefits are a decision you make at"],"branching":["**If** the audience competes on benefits **then** walk the three tiers and land on Premium +","**If** cost control is the theme **then** show the transparent per-tier monthly pricing and"],"say":"\"Benefits are optional and packaged. Three tiers — Standard at a hundred thirty a month, Premium at two-ten, Premium plus Maternity at two-sixty — each with clear coverage and pricing right here. One click adds real private medical, dental, and vision to the offer. No broker, no separate plan to stand up.\""},{"id":"026","title":"EOR — Submit Offer","module":"new-hire","type":"page","tier":"high","nav_path":["New Hire","EOR","Submit"],"children":["Submit offer to PrismHR for approval"],"tags":["new-hire","eor","offer","review","approval","submit"],"what":"Step 06, the final EOR step: a read-only recap of the whole offer — **Submit Offer Letter to PrismHR for Approval** — before submission.","capabilities":["Single review surface consolidating every prior step:","**Employee Info:** name, email, nationality, working country (e.g. nationality Mexico,","**Job Info:** job title, seniority, description, sub-department, direct manager, start date","**Compensation:** compensation type, contract amount (e.g. $2,000.00 per month), employment","**Equipment:** policy (e.g. Yes (Reimbursed))","**Benefits:** benefit package (e.g. Premium)","Submit routes the offer to **PrismHR for approval** (the EOR/backer handles the compliant"],"sp":["The entire cross-border offer — comp, benefits, equipment, start date — is verified on one","Submit hands the compliant employment to PrismHR: you originate and review, the EOR carries"],"de":["One glance confirms the whole global hire is right before it's submitted; no toggling between","Approval flows to PrismHR as the employer of record, so you extend the offer without standing"],"branching":["**If** the audience worries about compliance liability **then** emphasize that Submit routes","**If** speed-to-offer is the theme **then** show how the full package is reviewed and sent"],"say":"\"Last step — everything we built is on one page. Nationality Mexico, working from Singapore, two thousand a month, Premium benefits, reimbursed equipment. Looks right? Hit Submit and it goes to PrismHR for approval as the employer of record. You made the offer; we carry the compliance.\""},{"id":"027","title":"Contractor — Contractor Info","module":"new-hire","type":"page","tier":"medium","nav_path":["New Hire","Contractor","Contractor Info"],"children":["Contractor wizard: Job Info (Next)"],"tags":["new-hire","contractor","global-hiring","tax-residence","country-selection"],"what":"Step 01 of the four-step Contractor wizard: capture the contractor's name, email, and **tax residence**; this information is used to send the contract.","capabilities":["Four-step progress stepper (Contractor Info → Job Info → Compensation → Review)","**Tax residence** picker covering 175+ countries, including sub-national jurisdictions","Note that the entered details are used to send the contract","Save & Exit to resume the draft later"],"sp":["The contractor motion opens with tax residence, so the engagement is anchored to the right","The same 175+ country reach as the employee path means one product covers a client's whole"],"de":["Onboarding a contractor abroad starts with just name, email, and tax residence — the contract","Global coverage down to sub-region level means engaging a contractor in another country is a"],"branching":["**If** the audience engages contractors globally **then** open the tax-residence list to show", t you write here as the description goes straight into the agreement, so scope is on paper from the start.\""},{"id":"029","title":"Contractor — Compensation","module":"new-hire","type":"page","tier":"medium","nav_path":["New Hire","Contractor","Compensation"],"children":["Contractor wizard: Review (Next)","Add Additional Payment"],"tags":["new-hire","contractor","compensation","listopay","multi-currency","invoicing","payments"],"what":"Step 03 of the Contractor wizard: set how the contractor is paid — contract type, frequency, pay date, amount and currency — which drives the monthly invoice totals.","capabilities":["**Contract type**: Fixed (a fixed amount each month) or Hourly","**Payment frequency**: Monthly, Semi-Monthly, Bi-Weekly","**Pay date** option: Last business day of the month (default; \"most of your contractors use","**Contract payment amount** with a currency/country selector (e.g. USD / United States, \"Per","**Add Additional Payment** for other payments, commissions, or benefits","Payment rails: contractors are paid through the **ListoPay** digital wallet (\"Global payments","Note that these details determine the totals generated for the monthly invoices"],"sp":["Contractor pay terms feed directly into monthly invoice totals, so what you configure here is","Global payout runs on ListoPay's digital wallet, so paying a contractor anywhere is built in"],"de":["Fixed or hourly, on a chosen pay date, in the currency you pay — contractor comp is set once","Cross-border payout is handled through ListoPay, so you pay a contractor abroad without wiring"],"branching":["**If** the audience cares about payment logistics **then** highlight the ListoPay digital","**If** invoicing/billing is the theme **then** stress that these inputs generate the monthly"],"say":"\"Set the contractor's pay — fixed or hourly, the frequency, the pay date, the amount and currency. That directly builds your monthly invoice totals. And payout runs on ListoPay's digital wallet, so you're paying contractors anywhere in the world without standing up your own payment rails.\""},{"id":"040","title":"Onboarding","module":"onboarding","type":"page","tier":"high","nav_path":["Dashboard","Onboarding"],"children":["Continue (resume a draft hire)","View Worker (open an invited worker)","Send Reminder (nudge worker for signature)","Delete (discard a draft)","Search Workers","Sort","Filters","Pagination: Previous / Next"],"tags":["onboarding","eor","contractor","contractor-plus","payroll","multi-country","hiring","pipeline"],"what":"The onboarding pipeline: a single list of in-progress hires across every worker type — Contractor, Contractor+, Employer of Record, and Payroll — each showing its country, engagement type, and current onboarding stage.","capabilities":["One pipeline for **four engagement models** (Contractor, Contractor+, EOR, Payroll),","Per-worker **country** shown on every row (United Kingdom, Switzerland, Uganda,","Stage tracking with distinct states: **In Draft**, **Employee Invited**,","Stage-aware step chips (Contract, Offer Letter, Agreement, Start Date, Employee Info)","Stage-appropriate actions per row: **Continue** a draft, **View Worker**,","Search, Sort, and Filters over the whole pipeline"],"sp":["Every client's global hires — contractors, EOR employees, and local payroll —","The tab filter lets you slice by worker type instantly, so you can operate a mixed"],"de":["New hires in the UK, Mexico, Singapore, Uganda, and beyond sit in one list with a","Actions are stage-aware: the system tells you whether to Continue a draft, invite,"],"branching":["**If** the audience is contractor-heavy **then** filter to the **Contractor** /","**If** the story is compliant employment across borders **then** filter to"],"say":"\"Every hire you have in flight lives here — contractors, EOR employees, local payroll — across every country, in one pipeline. Each row tells you exactly what stage it's in and what to do next: continue a draft, invite the worker, or send a reminder. Flip the tabs and you can run just your contractors, or just your EOR employees, without leaving the screen.\""},{"id":"041","title":"Onboarding Success (EOR)","module":"onboarding","type":"page","tier":"medium","nav_path":["Dashboard","Onboarding","New Hire (EOR)","Success"],"children":["Go to Onboarding","Contact us (support)"],"tags":["onboarding","eor","success","offer-letter","guided","cx-support"],"what":"The post-submit confirmation shown after starting an Employer of Record hire, laying out the sequence of steps that will happen next to complete onboarding.","capabilities":["Explicit **\"what happens next\"** sequence: Offer Letter Generated → Invitation to","Offer letter is **auto-generated** from the information already entered and routed","**Candidate invitation** flow: the worker is invited to review the offer, accept,","**CX team involvement** — a support team guides the candidate through onboarding,","Direct path back via **Go to Onboarding** and a **Contact us** support link"],"sp":["After you submit an EOR hire, the platform tells your client exactly what happens","The CX team runs the candidate hand-holding with you kept in CC, so you scale global"],"de":["Submitting an EOR hire isn't the end of a form — it kicks off a guided sequence, and","You stay informed (CC'd on all communications) while a support team walks the new hire"],"branching":["**If** the concern is \"what happens after I hit submit\" **then** walk the four numbered","**If** the buyer worries about support burden **then** emphasize the **CX team** guiding"],"say":"\"The moment you submit an EOR hire, you get this. We generate the offer letter from what you entered, send it to you to approve, then invite the candidate to accept and complete their info. Our CX team guides them through onboarding and keeps you in CC the whole way — you'll always know it ends with a signed employment agreement.\""},{"id":"050","title":"Worker Profile — Details","module":"team","typ Documents"],"children":[],"tags":["team","worker-profile","documents","compliance"],"what":"The Documents tab of a worker's profile, listing the documents required for that worker's contract (shown here in an empty \"No Documents Requested\" state).","capabilities":["A per-worker view of **documents required in this contract**","**Empty state** handling: \"No Documents Requested\" when nothing is outstanding","Document requirements are scoped to the **individual contract**, not a global folder"],"sp":["Compliance documents live on the worker's own record and are tied to that contract, so","The clear empty state means \"nothing owed\" reads instantly, keeping document chase-downs"],"de":["Each worker's required documents sit right on their profile alongside pay, contract, and","When there's nothing outstanding, the tab says so plainly, so you're not left guessing."],"branching":["**If** the audience cares about compliance paperwork **then** open a worker who has","**If** keeping the tour brief **then** note the tab exists per-worker and move on to"],"say":"\"Every worker has a Documents tab tied to their contract. This one's clean — 'No Documents Requested' — so you know there's nothing outstanding for this person. When a contract does require paperwork, it surfaces right here on their record.\""},{"id":"052","title":"Worker Profile — Payments","module":"team","type":"tab","tier":"medium","nav_path":["Team","Worker profile","Payments"],"children":["Pagination: Previous / Next"],"tags":["team","worker-profile","payments","payroll","pay-history","multi-currency","mxn"],"what":"The Payments tab of a worker's profile: a paginated pay history listing every pay period with its contract, pay period dates, distribution date, and gross payment amount.","capabilities":["Full **pay history** per worker, one row per pay period (monthly here)","Columns for **Contract, Pay Period, Distributed At, Gross Payment**","Amounts shown in the worker's **local currency** (MXN) natively","Distinguishes **distributed** periods (with a Distributed At date) from **upcoming**","Paginated across a long history (2025 through 2026 visible)"],"sp":["Every payment ever made to a worker is on their record, in their local currency, so","Distributed vs. upcoming periods are visibly different, so you can see what has settled"],"de":["A complete, per-period pay history sits on each global team member's profile — in the","Past and future pay periods appear together, giving a running picture of what's been"],"branching":["**If** multi-currency is the hot button **then** anchor on the native **MXN** amounts","**If** the audience is operational **then** point at the **Distributed At** column to"],"say":"\"This is the worker's full pay history — every period, the dates, when it was distributed, and the gross amount, right in their local currency. You can see what's already been paid and what's still scheduled, all on their profile.\""},{"id":"053","title":"Worker Profile — Contracts","module":"team","type":"tab","tier":"medium","nav_path":["Team","Worker profile","Contracts"],"children":["Contract card (open contract detail)"],"tags":["team","worker-profile","contracts","pay-rate","signatures","payroll"],"what":"The Contracts tab of a worker's profile, showing the worker's contract as a card with its pay rate, engagement/rate type, and current status.","capabilities":["Per-worker **contract card** with initials, pay rate, and status","**Pay rate in local currency** with cadence (e.g. $66,272.69 MXN/month)","Engagement/rate descriptor (**Payroll - Fixed rate**)","Contract lifecycle **status** surfaced on the card (**Awaiting Signatures**)","Card is the entry point into the full contract detail"],"sp":["Each worker's contract, its rate, and its signing status are one click from the","The status chip (Awaiting Signatures) tells you immediately whether a contract is still"],"de":["The commercial terms for a global hire — rate, cadence, type — live on their profile in","A visible status makes it obvious when a contract still needs signatures to be complete."],"branching":["**If** signature/approval flow is the point **then** open the card into the contract","**If** keeping it high level **then** read the rate, type, and status off the card and move on."],"say":"\"Here's the worker's contract — the rate in their local currency, the fact it's a fixed-rate payroll engagement, and the status. This one's Awaiting Signatures, so we know it's not fully executed yet. Click in and you get the full contract.\""},{"id":"054","title":"Worker Profile — Time Off","module":"team","type":"tab","tier":"medium","nav_path":["Team","Worker profile","Time Off"],"children":["View Details (public holidays)","Create Request","Filter (history)"],"tags":["team","worker-profile","time-off","leave","public-holidays","balances"],"what":"The Time Off tab of a worker's profile, showing leave balances, pending requests, and a filterable history of past time-off requests with their outcomes.","capabilities":["**Leave balances** by category: Public Holidays (7 days), Sick Leave (3.8 days),","**View Details** on public holidays (country-specific holiday calendar)","**Pending Requests** area with a **Create Request** action and an empty state","**History** table with category, dates requested, time requested, approve/decline"],"sp":["Each worker's leave balances, holiday entitlement, and full request history are on","Public holidays are tracked per worker with their own calendar, so country-specific"],"de":["You can see exactly where a global team member stands on holidays, sick, and annual","Requests can be created and tracked to Approved right on the profile, so leave for"],"branching":["**If** country-specific compliance is the theme **then** open **View Details** on","**If** the audience runs approvals **then** walk the History row (requested → Approved"],"say":"\"Time off for this worker: their balances up top — public holidays, sick, annual — then any pending reque  terms, signature status, in-contract change actions (job title, pay rate, off-board), and a complete distributions ledger.","capabilities":["Contract **summary**: worker type (Contractor), country (United Kingdom), rate","**Signatures** section — Issuer and Contractor signatures with \"Sign and send the","In-contract changes: **Change Job Title** and **Change Pay Rate**, each with","**Request Off-board / Off-board** to end the engagement","**Distributions** ledger of every payout — Wages, One Time, Reimbursement — each with","**Additional Payments** (recurring items like a monthly Transportation Allowance) with"],"sp":["One screen holds the whole contract lifecycle — terms, signatures, mid-contract changes,","**Change Pay Rate** and **Change Job Title** carry **View History**, giving an auditable"],"de":["Everything about a global engagement lives here: what you agreed, who has signed, every","The distributions ledger shows exactly what was paid and when (GENERATED vs. SENT), so"],"branching":["**If** the story is managing change over time **then** show **Change Pay Rate** with","**If** the story is transparency / audit **then** scroll the **Distributions** ledger to","**If** the story is ending an engagement cleanly **then** point to **Request Off-board**."],"say":"\"This is the whole contract in one place — the terms, the signatures, and every change you can make: adjust the job title or pay rate, each with a full history, add recurring payments, or off-board the worker. Below it is the complete distribution ledger — every wage, one-time payment, and reimbursement, with status and amount, right in their currency.\""},{"id":"060","title":"Invoices","module":"invoices","type":"page","tier":"medium","nav_path":["Dashboard","Invoices"],"children":["Invoice row drilldown (e.g. Jun 30, 2026 Monthly Contractors Fee)","Invoice detail: Download","Invoice detail: Send Email"],"tags":["invoices","billing","eor","contractor","payroll","per-worker-fees"],"what":"The billing l
