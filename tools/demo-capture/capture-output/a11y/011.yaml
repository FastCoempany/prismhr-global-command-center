- main:
  - heading "Add One-Time Payment" [level=1]
  - navigation "Breadcrumb":
    - list:
      - listitem:
        - link "Dashboard":
          - /url: /
      - listitem:
        - link "Add One-Time Payment":
          - /url: /pay-periods/add-one-time-payment
  - heading "Enter Payment Details" [level=2]
  - paragraph: Select the payment type and amount for each worker below.
  - text: Pay Period Type
  - combobox "Pay Period Type":
    - option "Last day of the month - EOR"
    - option "Last day of the month - CONTRACTOR" [selected]
    - option "Last day of the month - PAYROLL"
  - text: Pay Period
  - combobox "Pay Period":
    - 'option "[Current] Jun 1, 2026 - Jun 30, 2026 - [Ends on: Jun 23, 2026]" [selected]'
    - option "[Next] Jul 1, 2026 - Jul 31, 2026"
  - textbox "Search workers"
  - button "Countries"
  - button "Sort Name"
