  - text: Division
  - combobox:
    - option "Select division"
    - option "Engineering Division"
    - option "Product Division"
  - heading "Location" [level=3]
  - combobox:
    - option "Unassigned"
    - option "San Francisco Office"
    - option "New York Office"
  - heading "Reporting Manager" [level=3]
  - paragraph: Auto-assigned based on organizational assignment
  - button "Assign Manager"
  - heading "Start date" [level=3]
  - paragraph: The earliest possible start date for this contract may vary due to regulatory requirements. Please note that visa and/or work permit requirements may cause delays.
