      - option "Greece"
      - option "Mexico"
      - option "Morocco"
      - option "North Macedonia (Republic of North Macedonia)"
      - option "Republic of Korea"
      - option "South Africa"
      - option "Taiwan (Province of China)"
      - option "Tanzania (United Republic of)"
    - button "Select State / Region (Optional)"
    - text: Gross salary
    - button "Select Currency"
    - textbox "Gross salary":
      - /placeholder: "0.00"
    - combobox "cdn-pay-period":
      - option "Monthly" [selected]
      - option "Annually"
    - button "Calculate"
- button "⏸ Stop capture"
